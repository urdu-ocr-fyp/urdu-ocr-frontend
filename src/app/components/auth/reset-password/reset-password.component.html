<div class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-white dark:from-gray-900 dark:via-slate-900 dark:to-gray-950 flex items-center justify-center p-4 md:p-8">
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-40 -left-40 w-80 h-80 bg-orange-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative backdrop-blur-xl bg-white/70 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-3xl shadow-2xl w-full max-w-md my-auto">
    <div class="absolute inset-0 bg-gradient-to-br from-amber-500/10 via-transparent to-orange-500/10 rounded-3xl"></div>
    <div class="h-2 bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 dark:from-amber-400 dark:via-orange-400 dark:to-rose-400 rounded-t-3xl"></div>

    <div class="p-6 md:p-8 relative z-10">
      <div class="text-center mb-8">
        <button (click)="goToLogin()" class="absolute left-6 top-6 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </button>
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-amber-600 to-orange-600 dark:from-amber-400 dark:to-orange-500 rounded-2xl mb-4 shadow-lg shadow-amber-500/25">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-amber-700 via-orange-600 to-rose-700 dark:from-amber-300 dark:via-orange-300 dark:to-rose-300 bg-clip-text text-transparent">
          Reset Password
        </h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2 text-sm">
          Choose a new password for your account
        </p>
      </div>

      <!-- Messages -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-rose-100 dark:bg-rose-500/10 border border-rose-300 dark:border-rose-500/20 rounded-lg text-rose-700 dark:text-rose-400 text-sm">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="mb-4 p-3 bg-emerald-100 dark:bg-emerald-500/10 border border-emerald-300 dark:border-emerald-500/20 rounded-lg text-emerald-700 dark:text-emerald-400 text-sm">
        {{ successMessage }}
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-600 dark:text-gray-400 mb-2">New Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'"
                   formControlName="newPassword"
                   [class.border-rose-500]="f['newPassword'].invalid && f['newPassword'].touched"
                   class="w-full px-4 py-3 pl-12 pr-12 bg-white dark:bg-gray-900/50 border border-gray-200 dark:border-white/10 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all"
                   placeholder="••••••••">
            <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <button type="button" (click)="togglePasswordVisibility()"
                    class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path *ngIf="!showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path *ngIf="!showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                <path *ngIf="showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L6.59 6.59m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
              </svg>
            </button>
          </div>
          <div *ngIf="f['newPassword'].invalid && f['newPassword'].touched" class="text-rose-600 dark:text-rose-400 text-xs mt-1 ml-1">
            <div *ngIf="f['newPassword'].errors?.['required']">Password is required</div>
            <div *ngIf="f['newPassword'].errors?.['minlength']">Minimum 8 characters</div>
            <div *ngIf="f['newPassword'].errors?.['pattern']">Must contain letters and numbers</div>
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-600 dark:text-gray-400 mb-2">Confirm Password</label>
          <div class="relative">
            <input [type]="showConfirmPassword ? 'text' : 'password'"
                   formControlName="confirmPassword"
                   [class.border-rose-500]="f['confirmPassword'].invalid && f['confirmPassword'].touched"
                   class="w-full px-4 py-3 pl-12 bg-white dark:bg-gray-900/50 border border-gray-200 dark:border-white/10 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all"
                   placeholder="••••••••">
            <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
          </div>
          <div *ngIf="f['confirmPassword'].invalid && f['confirmPassword'].touched" class="text-rose-600 dark:text-rose-400 text-xs mt-1 ml-1">
            <div *ngIf="f['confirmPassword'].errors?.['required']">Please confirm your password</div>
            <div *ngIf="f['confirmPassword'].errors?.['matching']">Passwords do not match</div>
          </div>
        </div>

        <button type="submit"
                [disabled]="isLoading || resetForm.invalid"
                class="w-full relative bg-gradient-to-r from-amber-600 to-orange-600 dark:from-amber-500 dark:to-orange-500 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-amber-500/25 hover:shadow-amber-500/40 hover:scale-[1.02] disabled:opacity-50 transition-all duration-300">
          <span *ngIf="!isLoading">Reset Password</span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Resetting...
          </span>
        </button>
      </form>
    </div>
    <div class="h-1 bg-gradient-to-r from-rose-500 via-orange-500 to-amber-500 dark:from-rose-400 dark:via-orange-400 dark:to-amber-400 opacity-50 rounded-b-3xl"></div>
  </div>
</div>
