<div class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-white dark:from-gray-900 dark:via-slate-900 dark:to-gray-950 flex items-center justify-center p-4 md:p-8">
  <!-- Animated background elements - warm colors -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-40 -left-40 w-80 h-80 bg-orange-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/4 left-10 opacity-5 rotate-12 text-6xl font-arabic hidden md:block" style="font-family: 'Noto Nastaliq Urdu', serif;">
      اردو
    </div>
    <div class="absolute bottom-1/4 right-10 opacity-5 -rotate-12 text-6xl font-arabic hidden md:block" style="font-family: 'Noto Nastaliq Urdu', serif;">
      نستعلیق
    </div>
  </div>

  <!-- Main card -->
  <div class="relative backdrop-blur-xl bg-white/70 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-3xl shadow-2xl w-full max-w-md my-auto">
    <div class="absolute inset-0 bg-gradient-to-br from-amber-500/10 via-transparent to-orange-500/10 rounded-3xl"></div>
    <div class="h-2 bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 dark:from-amber-400 dark:via-orange-400 dark:to-rose-400 rounded-t-3xl"></div>

    <div class="p-6 md:p-8 relative z-10">
      <!-- Header -->
      <div class="text-center mb-8">
        <button (click)="goToLogin()" class="absolute left-6 top-6 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </button>
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-amber-600 to-orange-600 dark:from-amber-400 dark:to-orange-500 rounded-2xl mb-4 shadow-lg shadow-amber-500/25">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7.5a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM9 10.5a6 6 0 00-6 6v.5h12v-.5a6 6 0 00-6-6z"></path>
          </svg>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-amber-700 via-orange-600 to-rose-700 dark:from-amber-300 dark:via-orange-300 dark:to-rose-300 bg-clip-text text-transparent">
          Forgot Password?
        </h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2 text-sm">
          Enter your email to receive a reset link
        </p>
      </div>

      <!-- Messages -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-rose-100 dark:bg-rose-500/10 border border-rose-300 dark:border-rose-500/20 rounded-lg text-rose-700 dark:text-rose-400 text-sm">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="mb-4 p-3 bg-emerald-100 dark:bg-emerald-500/10 border border-emerald-300 dark:border-emerald-500/20 rounded-lg text-emerald-700 dark:text-emerald-400 text-sm">
        {{ successMessage }}
      </div>

      <!-- Form -->
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <div class="relative">
            <input type="email"
                   formControlName="email"
                   [class.border-rose-500]="f['email'].invalid && f['email'].touched"
                   class="w-full px-4 py-3 pl-12 bg-white dark:bg-gray-900/50 border border-gray-200 dark:border-white/10 rounded-xl text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500/50 transition-all duration-200"
                   placeholder="you@example.com">
            <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 dark:text-gray-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
              </svg>
            </div>
          </div>
          <div *ngIf="f['email'].invalid && f['email'].touched" class="text-rose-600 dark:text-rose-400 text-xs mt-1 ml-1">
            <div *ngIf="f['email'].errors?.['required']">Email is required</div>
            <div *ngIf="f['email'].errors?.['email']">Please enter a valid email</div>
          </div>
        </div>

        <button type="submit"
                [disabled]="isLoading || forgotForm.invalid"
                class="w-full relative bg-gradient-to-r from-amber-600 to-orange-600 dark:from-amber-500 dark:to-orange-500 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-amber-500/25 hover:shadow-amber-500/40 hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:hover:shadow-amber-500/25 transition-all duration-300">
          <span *ngIf="!isLoading">Send Reset Link</span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Sending...
          </span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-600 dark:text-gray-400 text-sm">
          Remember your password?
          <button (click)="goToLogin()" class="text-amber-600 hover:text-amber-700 dark:text-amber-400 dark:hover:text-amber-300 font-medium ml-1 transition hover:underline">
            Back to Login
          </button>
        </p>
      </div>
    </div>
    <div class="h-1 bg-gradient-to-r from-rose-500 via-orange-500 to-amber-500 dark:from-rose-400 dark:via-orange-400 dark:to-amber-400 opacity-50 rounded-b-3xl"></div>
  </div>
</div>
