<div class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-white dark:from-gray-900 dark:via-slate-900 dark:to-gray-950 overflow-hidden">
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/3 left-10 w-60 h-60 bg-orange-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-40 -left-40 w-80 h-80 bg-rose-500/10 rounded-full blur-3xl"></div>
  </div>

  <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-amber-700 via-orange-600 to-rose-700 dark:from-amber-300 dark:via-orange-300 dark:to-rose-300 bg-clip-text text-transparent">
        OCR Results
      </h1>
      <p class="text-gray-600 dark:text-gray-400 mt-2">Extracted text from your uploaded documents</p>
    </div>

    <!-- Skeleton loading (only when isLoading) -->
    <div *ngIf="isLoading" class="grid lg:grid-cols-2 gap-6">
      <!-- Left skeleton -->
      <div class="space-y-4">
        <div class="h-8 w-40 bg-gray-200 dark:bg-gray-700 rounded animate-pulse"></div>
        <div class="bg-white/70 dark:bg-white/5 rounded-2xl p-4">
          <div class="h-80 bg-gray-200 dark:bg-gray-700 rounded animate-pulse"></div>
        </div>
        <div class="bg-white/70 dark:bg-white/5 rounded-2xl p-4">
          <div class="space-y-2">
            <div class="h-16 bg-gray-200 dark:bg-gray-700 rounded animate-pulse"></div>
            <div class="h-16 bg-gray-200 dark:bg-gray-700 rounded animate-pulse"></div>
          </div>
        </div>
      </div>
      <!-- Right skeleton -->
      <div class="bg-white/70 dark:bg-white/5 rounded-2xl p-6">
        <div class="h-8 w-48 bg-gray-200 dark:bg-gray-700 rounded animate-pulse mb-4"></div>
        <div class="space-y-3">
          <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded animate-pulse w-full"></div>
          <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded animate-pulse w-11/12"></div>
          <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded animate-pulse w-10/12"></div>
          <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded animate-pulse w-full"></div>
        </div>
      </div>
    </div>

    <!-- Error state -->
    <div *ngIf="!isLoading && errorMessage" class="text-center py-12">
      <p class="text-rose-600 dark:text-rose-400 mb-4">{{ errorMessage }}</p>
      <a routerLink="/upload" class="inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-amber-600 to-orange-600 dark:from-amber-500 dark:to-orange-500 text-white font-medium rounded-xl hover:opacity-90 transition">
        Go to Upload
      </a>
    </div>

    <!-- Results grid (only when loaded and files exist) -->
    <div *ngIf="!isLoading && !errorMessage && files.length > 0" class="grid lg:grid-cols-2 gap-6">
      <!-- Left column: file previews -->
      <div class="space-y-4">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-3">Uploaded Files</h2>

        <!-- Main preview -->
        <div class="relative backdrop-blur-xl bg-white/70 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl p-4 shadow-sm">
          <div *ngIf="files[selectedFileIndex]?.imageSrc">
            <img [src]="files[selectedFileIndex].imageSrc" [alt]="files[selectedFileIndex].name" class="max-h-96 mx-auto rounded-lg object-contain">
          </div>
          <div *ngIf="!files[selectedFileIndex]?.imageSrc" class="flex flex-col items-center justify-center py-8">
            <svg class="w-20 h-20 text-rose-600 dark:text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
            <p class="text-gray-600 dark:text-gray-400 mt-2">No preview available</p>
          </div>
        </div>

        <!-- File list with thumbnails -->
        <div class="relative backdrop-blur-xl bg-white/70 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl p-4 shadow-sm">
          <div class="space-y-2 max-h-80 overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-400 dark:scrollbar-thumb-gray-600" [@staggerList]="files.length">
            <div *ngFor="let file of files; let i = index"
                 (click)="selectFile(i)"
                 [class]="getFileItemClasses(i)"
                 @fadeSlideIn>
              <div class="w-10 h-10 rounded overflow-hidden flex-shrink-0 mr-3">
                <img *ngIf="file.imageSrc" [src]="file.imageSrc" class="w-full h-full object-cover">
                <div *ngIf="!file.imageSrc" class="w-full h-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                  <svg class="w-6 h-6 text-rose-600 dark:text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                  </svg>
                </div>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm text-gray-900 dark:text-white truncate">{{ file.name }}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right column: extracted text -->
      <div class="relative backdrop-blur-xl bg-white/70 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4">Extracted Urdu Text</h2>
        <textarea [(ngModel)]="files[selectedFileIndex].extractedText"
                  rows="15"
                  class="w-full bg-white dark:bg-gray-900/50 border border-gray-200 dark:border-white/10 rounded-xl p-4 text-gray-900 dark:text-white font-arabic text-right focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500/50 transition-all resize-y"
                  style="direction: rtl; font-family: 'Noto Nastaliq Urdu', serif; font-size: 1rem; line-height: 1.6;"
                  placeholder="Extracted text will appear here..."></textarea>
        <div class="flex flex-wrap gap-3 mt-4">
          <button (click)="copyToClipboard()"
                  class="flex items-center gap-2 px-4 py-2 bg-white hover:bg-gray-50 dark:bg-white/5 dark:hover:bg-white/10 border border-gray-200 dark:border-white/10 rounded-lg text-gray-700 dark:text-gray-300 transition-all duration-200 hover:border-amber-300 dark:hover:border-amber-500/30">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
            </svg>
            Copy
          </button>
          <button (click)="downloadAsTxt()"
                  class="flex items-center gap-2 px-4 py-2 bg-white hover:bg-gray-50 dark:bg-white/5 dark:hover:bg-white/10 border border-gray-200 dark:border-white/10 rounded-lg text-gray-700 dark:text-gray-300 transition-all duration-200 hover:border-amber-300 dark:hover:border-amber-500/30">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download .txt
          </button>
          <a routerLink="/upload"
             class="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-amber-600 to-orange-600 dark:from-amber-500 dark:to-orange-500 text-white rounded-lg hover:opacity-90 transition-all duration-200 ml-auto shadow-sm hover:shadow-md">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Upload
          </a>
        </div>
      </div>
    </div>
  </main>
</div>
